# Server Configuration
server.port=${LEXICON_PORT:36568}
server.address=${SERVER_ADDRESS:0.0.0.0}

# Enable storage profile for 500GB volume
spring.profiles.include=storage

# CORS Configuration
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,https://alex-dyakin.com,https://api.alex-dyakin.com,https://alchemy.alex-dyakin.com,http://209.25.140.16:1796,http://209.25.140.16:1760,http://209.25.140.16:1792,http://possibilities-flaw.with.playit.plus:1796,http://possibilities-bmc.with.playit.plus:1760,http://possibilities-alvin.with.playit.plus:1792}

# Database Configuration
# Use same database as Alchemy for unified users
database.url=${DATABASE_URL:jdbc:hsqldb:hsql://localhost:9002/mydb}

# HikariCP Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.leak-detection-threshold=60000

# File upload configuration
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:2GB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:2GB}

# Timeout configuration for large file uploads (in milliseconds)
# 30 minutes for connection and read timeout
server.tomcat.connection-timeout=1800000
spring.mvc.async.request-timeout=1800000

# Session cookie settings for cross-site access via PlayIt tunnels
# SameSite=None so cookies are sent cross-site; secure=false here so it works over HTTP PlayIt tunnels (mobile)
# If you use HTTPS tunnels, set secure=true instead for stricter security
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=false

# File storage path
lexicon.file.upload-dir=${UPLOAD_DIR:./uploads}

# Session cookie settings to avoid SameSite=None without Secure
server.servlet.session.cookie.same-site=lax

# yt-dlp configuration (set YTDLP_COOKIES_PATH environment variable)
ytdlp.cookies.path=${YTDLP_COOKIES_PATH:}